seed: 42

data:
  root: datasets/imagenet100
  batch_size: 256
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  drop_last: true
  num_global_views: 2
  num_local_views: 0
  out_size: 224
  global_scale: [0.4, 1.0]
  local_scale: [0.05, 0.4]

model:
  encoder_mode: tokens
  token_layer: layer3
  token_d_f: 32
  token_hw: 8
  encoder_stem: imagenet
  embed_dim: 2048
  proj_hidden: 2048
  proj_out: 2048
  projector_type: identity
  split_qp: true

train:
  epochs: 45
  lr: 0.0005
  weight_decay: 0.0005
  lambda_reg: 0.02
  warmup_epochs: 10
  min_lr_ratio: 0.001
  precision: bf16
  ckpt_dir: checkpoints
  checkpoint_every: 5
  log_every: 100

regularizer:
  type: sigreg
  num_slices: 64
  t_max: 3.0
  n_points: 9
